[program:consumer]
directory=/opt/codes/mq-auto-scale/scripts
environment=PYTHONPATH="/opt/codes/mq-auto-scale/scripts/lib"
command=python3 consumer.py

## 运行参数
user=zhangsan
process_name=%(process_num)02d
numprocs=2
autostart=true
autorestart=true
startretries=3
startsecs=10
exitcodes=0
stopsignal=KILL
stopwaitsecs=10
redirect_stderr=true

## 日志配置
stdout_logfile=/var/log/supervisor/consumer.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=6
stderr_logfile=/dev/null
stderr_logfile_maxbytes=0
stderr_logfile_backups=0
[supervisord]
[supervisorctl]
